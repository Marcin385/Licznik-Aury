<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA — Tracker Punktów</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --bg2: #0e0e1a;
  --bg3: #13131f;
  --card: #141420;
  --card2: #1a1a2e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0eef8;
  --muted: #6b6880;
  --accent: #a78bfa;
  --accent2: #7c3aed;
  --gold: #f59e0b;
  --silver: #94a3b8;
  --bronze: #cd7f32;
  --green: #10b981;
  --red: #f43f5e;
  --cyan: #22d3ee;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  cursor:default;
}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}

/* ── LAYOUT ── */
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* ── HEADER ── */
.header{text-align:center;padding:3rem 0 2.5rem;position:relative}
.header-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(64px,12vw,110px);
  letter-spacing:6px;
  line-height:.9;
  background:linear-gradient(135deg,#e0d7ff 0%,#a78bfa 40%,#7c3aed 70%,#4f1fd4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titlePulse 4s ease-in-out infinite;
}
@keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.15)}}
.header-sub{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:.75rem}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:2rem}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:500;letter-spacing:.5px;cursor:pointer;transition:all .2s;color:var(--muted);border:none;background:transparent}
.tab.active{background:var(--card2);color:var(--text);box-shadow:0 0 20px rgba(124,58,237,.2)}
.tab:hover:not(.active){color:var(--text)}

/* ── PANEL ── */
.panel{display:none}.panel.active{display:block}

/* ── RANKING ── */
.ranking-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}

.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:2rem;align-items:end}
.podium-slot{border-radius:16px;padding:1.25rem 1rem;text-align:center;border:1px solid var(--border);background:var(--card);position:relative;overflow:hidden;transition:transform .2s}
.podium-slot:hover{transform:translateY(-3px)}
.podium-slot::before{content:'';position:absolute;inset:0;opacity:.06;pointer-events:none}
.podium-1{border-color:rgba(245,158,11,.3);background:linear-gradient(160deg,#1a1620 0%,#1c1408 100%)}
.podium-1::before{background:var(--gold)}
.podium-2{border-color:rgba(148,163,184,.2)}
.podium-3{border-color:rgba(205,127,50,.2)}
.podium-rank{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1}
.podium-1 .podium-rank{color:var(--gold);text-shadow:0 0 20px rgba(245,158,11,.6)}
.podium-2 .podium-rank{color:var(--silver)}
.podium-3 .podium-rank{color:var(--bronze)}
.podium-avatar{width:52px;height:52px;border-radius:50%;margin:8px auto;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;border:2px solid var(--border2)}
.podium-name{font-size:15px;font-weight:600;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.podium-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);margin-top:2px}
.podium-title{font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-top:2px}

.leaderboard{display:flex;flex-direction:column;gap:8px}
.lb-row{
  display:grid;grid-template-columns:36px 48px 1fr auto auto;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:.75rem 1rem;transition:all .2s;cursor:pointer;
}
.lb-row:hover{border-color:var(--border2);background:var(--card2);transform:translateX(4px)}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--muted);text-align:center}
.lb-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;border:1.5px solid var(--border2)}
.lb-name{font-weight:500;font-size:15px}
.lb-title{font-size:11px;color:var(--muted)}
.lb-score{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent)}
.lb-controls{display:flex;gap:6px;align-items:center}
.btn-pt{
  width:30px;height:30px;border-radius:50%;border:1.5px solid;
  background:transparent;cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-weight:600;line-height:1
}
.btn-plus{color:var(--green);border-color:rgba(16,185,129,.4)}
.btn-plus:hover{background:rgba(16,185,129,.15);transform:scale(1.1)}
.btn-minus{color:var(--red);border-color:rgba(244,63,94,.4)}
.btn-minus:hover{background:rgba(244,63,94,.15);transform:scale(1.1)}
.step-in{
  width:40px;height:28px;text-align:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:12px;outline:none;
}
.step-in:focus{border-color:var(--accent)}

/* ── ADD FRIEND ── */
.add-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.add-row{display:flex;gap:10px;margin-bottom:1rem}
.field{
  flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;
  transition:border-color .15s
}
.field:focus{border-color:var(--accent)}
.field::placeholder{color:var(--muted)}
.btn-add{
  padding:10px 20px;background:var(--accent2);color:#fff;
  border:none;border-radius:10px;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit
}
.btn-add:hover{background:#6d28d9;transform:translateY(-1px)}
.btn-add:active{transform:scale(.97)}
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem}
.emoji-btn{
  width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg3);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s
}
.emoji-btn:hover,.emoji-btn.sel{border-color:var(--accent);background:rgba(167,139,250,.15)}
.color-pick{display:flex;gap:8px;flex-wrap:wrap;margin-top:.75rem}
.color-dot{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:all .15s
}
.color-dot.sel{border-color:#fff;transform:scale(1.15)}

/* ── PROFILES ── */
.profiles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.profile-card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:1.5rem 1rem;text-align:center;transition:all .2s;cursor:pointer;position:relative;overflow:hidden
}
.profile-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.profile-card::after{
  content:'';position:absolute;inset:0;opacity:0;
  background:radial-gradient(circle at 50% 0%,rgba(167,139,250,.12),transparent 70%);
  transition:opacity .3s
}
.profile-card:hover::after{opacity:1}
.profile-avatar{width:64px;height:64px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--border2);position:relative}
.profile-crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:18px}
.profile-name{font-size:16px;font-weight:600;margin-bottom:4px}
.profile-title-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;
  background:rgba(167,139,250,.15);color:var(--accent);border:1px solid rgba(167,139,250,.3);
  margin-bottom:12px
}
.profile-score-big{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--accent);line-height:1}
.profile-pts-label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.stat-box{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.stat-val{font-size:16px;font-weight:600;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.btn-delete{
  position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;
  background:transparent;border:1px solid var(--border);color:var(--muted);
  cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .15s
}
.profile-card:hover .btn-delete{opacity:1}
.btn-delete:hover{background:rgba(244,63,94,.2);color:var(--red);border-color:rgba(244,63,94,.4)}

/* ── HISTORY ── */
.history-list{display:flex;flex-direction:column;gap:6px;max-height:500px;overflow-y:auto;padding-right:4px}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-track{background:transparent}
.history-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.hist-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.65rem 1rem
}
.hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-text{flex:1;font-size:13px;color:var(--muted)}
.hist-text strong{color:var(--text);font-weight:500}
.hist-delta{font-family:'Bebas Neue',sans-serif;font-size:20px}
.hist-time{font-size:11px;color:var(--muted);flex-shrink:0}
.hist-pos{color:var(--green)}
.hist-neg{color:var(--red)}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:14px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--card2);border:1px solid var(--border2);border-radius:12px;
  padding:.75rem 1.5rem;font-size:14px;font-weight:500;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:999;pointer-events:none;white-space:nowrap
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── SCORE POPUP ── */
.score-popup{
  position:fixed;font-family:'Bebas Neue',sans-serif;font-size:36px;
  pointer-events:none;z-index:9999;animation:popupFly 1.2s ease-out forwards
}
@keyframes popupFly{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-80px) scale(1.4)}
}

/* ── NOTE MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:1rem;
  opacity:0;pointer-events:none;transition:opacity .2s
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--card2);border:1px solid var(--border2);border-radius:18px;
  padding:1.5rem;width:100%;max-width:420px;
  transform:translateY(20px) scale(.97);transition:transform .25s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .modal{transform:translateY(0) scale(1)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:1rem}
.modal-who{font-size:13px;color:var(--muted);margin-bottom:.75rem}
.modal-note{
  width:100%;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;
  padding:10px 14px;resize:none;outline:none;transition:border-color .15s;
  min-height:80px;
}
.modal-note:focus{border-color:var(--accent)}
.modal-note::placeholder{color:var(--muted)}
.modal-btns{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.modal-cancel{
  padding:8px 16px;background:transparent;border:1px solid var(--border2);
  border-radius:8px;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px;
  transition:all .15s
}
.modal-cancel:hover{color:var(--text);border-color:var(--border2)}
.modal-confirm{
  padding:8px 18px;background:var(--accent2);border:none;
  border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
  transition:all .15s
}
.modal-confirm:hover{background:#6d28d9}
.note-chip{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);
  border-radius:6px;padding:2px 7px;font-size:11px;color:var(--accent);
  margin-top:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* ── TOP MOMENTS in profile ── */
.top-moments{margin-top:10px;text-align:left}
.top-moments-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;text-align:center}
.moment-row{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border-radius:8px;padding:6px 8px;margin-bottom:4px
}
.moment-delta{font-family:'Bebas Neue',sans-serif;font-size:18px;min-width:36px}
.moment-note{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}

/* ── MISC ── */
.danger-btn{
  padding:6px 14px;background:transparent;border:1px solid rgba(244,63,94,.3);
  border-radius:8px;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;
  transition:all .15s
}
.danger-btn:hover{background:rgba(244,63,94,.12)}
.reset-row{display:flex;justify-content:flex-end;margin-top:1rem}
.glow-line{height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:1.5rem 0;opacity:.3}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div id="loader" style="position:fixed;inset:0;z-index:9000;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:6px;background:linear-gradient(135deg,#e0d7ff,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">AURA</div>
  <div style="font-size:13px;letter-spacing:3px;color:#6b6880;text-transform:uppercase">Łączenie z bazą danych...</div>
  <div style="width:120px;height:2px;background:#1a1a2e;border-radius:2px;overflow:hidden;margin-top:.5rem"><div id="loaderBar" style="height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:2px;transition:width 2s ease"></div></div>
</div>

<div class="wrap">
  <div class="header">
    <div class="header-title">AURA</div>
    <div class="header-sub">System punktów paczki</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('ranking')">🏆 Ranking</button>
    <button class="tab" onclick="switchTab('profiles')">👤 Profile</button>
    <button class="tab" onclick="switchTab('add')">➕ Dodaj</button>
    <button class="tab" onclick="switchTab('history')">📜 Historia</button>
  </div>

  <!-- RANKING -->
  <div class="panel active" id="tab-ranking">
    <div class="ranking-header">
      <span class="section-label">Aktualne Wyniki</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="section-label">krok:</span>
        <input class="step-in" type="number" id="globalStep" value="1" min="1" max="9999" style="width:50px">
      </div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="glow-line"></div>
    <div class="leaderboard" id="leaderboard"></div>
    <div class="empty-state" id="rankingEmpty" style="display:none">Brak graczy. Dodaj znajomych w zakładce ➕</div>
  </div>

  <!-- PROFILES -->
  <div class="panel" id="tab-profiles">
    <div class="profiles-grid" id="profilesGrid"></div>
    <div class="empty-state" id="profilesEmpty" style="display:none">Brak profili. Dodaj znajomych!</div>
  </div>

  <!-- ADD -->
  <div class="panel" id="tab-add">
    <div class="add-card">
      <div class="section-label" style="margin-bottom:1rem">Nowy gracz</div>
      <div class="add-row">
        <input class="field" id="addName" type="text" placeholder="Imię / ksywka..." maxlength="20">
        <button class="btn-add" onclick="addPlayer()">Dodaj</button>
      </div>
      <div class="section-label" style="margin-bottom:.5rem">Emoji awatara</div>
      <div class="emoji-pick" id="emojiPick"></div>
      <div class="section-label" style="margin-top:1rem;margin-bottom:.5rem">Kolor</div>
      <div class="color-pick" id="colorPick"></div>
    </div>
    <div class="reset-row">
      <button class="danger-btn" onclick="confirmReset()">🗑 Resetuj wszystkie dane</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="tab-history">
    <div class="ranking-header">
      <span class="section-label">Historia wydarzeń</span>
      <button class="danger-btn" onclick="clearHistory()">Wyczyść</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="empty-state" id="historyEmpty">Brak historii. Zacznij dodawać punkty!</div>
  </div>
</div>

<!-- NOTE MODAL -->
<div class="modal-overlay" id="noteModal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Dodaj notatkę</div>
    <div class="modal-who" id="modalWho"></div>
    <textarea class="modal-note" id="modalNote" placeholder="Za co ta aura? (opcjonalne)..." maxlength="120" rows="3"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="cancelModal()">Anuluj</button>
      <button class="modal-confirm" onclick="confirmModal()">Zatwierdź ↗</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

// ── DATA ──

const COLORS = ['#7c3aed','#0891b2','#059669','#dc2626','#d97706','#db2777','#4f46e5','#0284c7','#16a34a','#ea580c'];

db.ref('players').on('value', snap => {

  if(dbReady) render();
});
db.ref('history').on('value', snap => {
  const data = snap.val();
  history = data ? Object.entries(data).map(([k,v])=>({...v,_key:k}))
    .sort((a,b)=>b.ts-a.ts).slice(0,300) : [];
  if(dbReady) renderHistory();
  dbReady = true;
});

function savePlayer(p){
  const {_key,...data} = p;
  if(_key) {
    db.ref('players/'+_key).set(data);
  } else {
    const nr = db.ref('players').push();
    p._key = nr.key;
    nr.set(data);
  }
}
function saveHistoryEntry(entry){
  db.ref('history').push().set(entry);
}
function removePlayer(key){ db.ref('players/'+key).remove(); }

function getTitle(score){
  let t = TITLES[0];
  for(const ti of TITLES) if(score>=ti.min) t=ti;
  return t;
}

function initials(name){return name.trim().split(/\s+/).map(w=>w[0].toUpperCase()).slice(0,2).join('')}

function timeAgo(ts){
  const d = (Date.now()-ts)/1000;
  if(d<60) return 'przed chwilą';
  if(d<3600) return `${Math.floor(d/60)}min temu`;
  if(d<86400) return `${Math.floor(d/3600)}h temu`;
  return `${Math.floor(d/86400)}d temu`;
}

// ── MODAL / SCORE CHANGE ──
let pendingAction = null;
function changeScore(id, dir){
  const step = parseInt(document.getElementById('globalStep').value)||1;
  const p = players.find(x=>x.id===id);
  if(!p) return;
  const delta = dir * step;
  pendingAction = {id, delta};
  document.getElementById('modalWho').textContent = `${p.emoji||''} ${p.name}  ·  ${delta>0?'+':''} ${delta} aury`;
  document.getElementById('modalNote').value = '';
  document.getElementById('noteModal').classList.add('open');
  setTimeout(()=>document.getElementById('modalNote').focus(),250);
}
function confirmModal(){
  if(!pendingAction) return;
  const note = document.getElementById('modalNote').value.trim();
  applyScore(pendingAction.id, pendingAction.delta, note);
  closeModalNow();
  pendingAction = null;
}
function cancelModal(){ closeModalNow(); pendingAction=null; }
function closeModal(e){ if(e.target===document.getElementById('noteModal')) closeModalNow(); }
function closeModalNow(){ document.getElementById('noteModal').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') cancelModal(); });

function applyScore(id, delta, note){
  const p = players.find(x=>x.id===id);
  if(!p) return;
  p.score += delta;
  p.totalAdded = (p.totalAdded||0) + (delta>0?delta:0);
  p.totalLost  = (p.totalLost||0)  + (delta<0?Math.abs(delta):0);
  p.changes = (p.changes||0)+1;
  savePlayer(p);
  const entry = {id,name:p.name,delta,ts:Date.now()};
  if(note) entry.note = note;
  saveHistoryEntry(entry);
  spawnPopup(delta);
  toast(`${p.name}: ${delta>0?'+':''} ${delta} aury${note?' — '+note:''}`);
}

function spawnPopup(delta){
  const el = document.createElement('div');
  el.className='score-popup';
  el.style.left = (Math.random()*60+20)+'%';
  el.style.top  = (Math.random()*30+30)+'%';
  el.style.color = delta>0?'#10b981':'#f43f5e';
  el.textContent = (delta>0?'+':'')+delta;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1300);
}

// ── RENDER ──
function render(){
  renderRanking();
  renderProfiles();
  renderHistory();
}

function sorted(){return [...players].sort((a,b)=>b.score-a.score)}

function renderRanking(){
  const list = sorted();
  const podium = document.getElementById('podium');
  const lb = document.getElementById('leaderboard');
  const empty = document.getElementById('rankingEmpty');

  if(!list.length){podium.innerHTML='';lb.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';

  // Podium (top 3)
  const top3 = [list[1],list[0],list[2]]; // 2nd,1st,3rd layout
  const medals = ['🥈','🥇','🥉'];
  const ranks = [2,1,3];
  podium.innerHTML = top3.map((p,i)=>{
    if(!p) return `<div class="podium-slot podium-${ranks[i]}" style="opacity:.25"><div class="podium-rank">${ranks[i]}</div></div>`;
    const t = getTitle(p.score);
    return `<div class="podium-slot podium-${ranks[i]}">
      <div style="font-size:22px">${medals[i]}</div>
      <div class="podium-avatar" style="background:${p.color}22;border-color:${p.color}55">${p.emoji||initials(p.name)}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${p.score}</div>
      <div class="podium-title" style="color:${t.color}">${t.label}</div>
    </div>`;
  }).join('');

  // Full list
  lb.innerHTML = list.map((p,i)=>{
    const t = getTitle(p.score);
    return `<div class="lb-row" onclick="switchTab('profiles')">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-avatar" style="background:${p.color}22;border-color:${p.color}55">${p.emoji||initials(p.name)}</div>
      <div>
        <div class="lb-name">${p.name}</div>
        <div class="lb-title" style="color:${t.color}">${t.label}</div>
      </div>
      <div class="lb-score">${p.score}</div>
      <div class="lb-controls" onclick="event.stopPropagation()">
        <button class="btn-pt btn-minus" onclick="changeScore(${p.id},-1)">−</button>
        <button class="btn-pt btn-plus"  onclick="changeScore(${p.id},1)">+</button>
      </div>
    </div>`;
  }).join('');
}

function topMomentsHTML(pid){
  const moments = history.filter(h=>h.id===pid&&h.note&&h.delta>0)
    .sort((a,b)=>b.delta-a.delta).slice(0,3);
  if(!moments.length) return '';
  return `<div class="top-moments">
    <div class="top-moments-label">🏅 Top momenty</div>
    ${moments.map(m=>`<div class="moment-row">
      <div class="moment-delta" style="color:#10b981">+${m.delta}</div>
      <div class="moment-note">${m.note}</div>
    </div>`).join('')}
  </div>`;
}

function renderProfiles(){
  const list = sorted();
  const grid = document.getElementById('profilesGrid');
  const empty = document.getElementById('profilesEmpty');
  if(!list.length){grid.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  grid.innerHTML = list.map((p,i)=>{
    const t = getTitle(p.score);
    const crown = i===0?'<div class="profile-crown">👑</div>':'';
    return `<div class="profile-card">
      <button class="btn-delete" onclick="deletePlayer(${p.id})">✕</button>
      <div class="profile-avatar" style="background:${p.color}22;border-color:${p.color}44">
        ${crown}
        <span style="font-size:26px">${p.emoji||initials(p.name)}</span>
      </div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-title-badge" style="color:${t.color};border-color:${t.color}44;background:${t.color}18">${t.label}</div>
      <div class="profile-score-big" style="color:${p.score<0?'#f43f5e':p.score===0?'#6b7280':'#a78bfa'}">${p.score}</div>
      <div class="profile-pts-label">punktów aury</div>
      <div class="profile-stats">
        <div class="stat-box"><div class="stat-val" style="color:#10b981">+${p.totalAdded||0}</div><div class="stat-lbl">zdobyte</div></div>
        <div class="stat-box"><div class="stat-val" style="color:#f43f5e">-${p.totalLost||0}</div><div class="stat-lbl">stracone</div></div>
        <div class="stat-box"><div class="stat-val">${p.changes||0}</div><div class="stat-lbl">zmian</div></div>
        <div class="stat-box"><div class="stat-val">${i+1}</div><div class="stat-lbl">miejsce</div></div>
      </div>
      ${topMomentsHTML(p.id)}
    </div>`;
  }).join('');
}

function renderHistory(){
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  if(!history.length){list.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  list.innerHTML = history.map(h=>{
    const pos = h.delta>0;
    return `<div class="hist-item">
      <div class="hist-dot" style="background:${pos?'#10b981':'#f43f5e'}"></div>
      <div class="hist-text"><strong>${h.name}</strong> ${pos?'zyskał':'stracił'} aurę</div>
      <div class="hist-delta ${pos?'hist-pos':'hist-neg'}">${pos?'+':''}${h.delta}</div>
      <div class="hist-time">${timeAgo(h.ts)}</div>
    </div>`;
  }).join('');
}

// ── ADD PLAYER ──
function addPlayer(){
  const name = document.getElementById('addName').value.trim();
  if(!name) return toast('Wpisz imię!');
  if(players.find(p=>p.name.toLowerCase()===name.toLowerCase())) return toast('Taki gracz już istnieje!');
  const p = {id:Date.now(),name,emoji:selEmoji,color:selColor,score:0,totalAdded:0,totalLost:0,changes:0};
  savePlayer(p);
  document.getElementById('addName').value='';
  toast(`${name} dołączył do paczki! 🎉`);
  switchTab('ranking');
}

function deletePlayer(id){
  const p = players.find(x=>x.id===id);
  if(!p) return;
  if(!confirm(`Usunąć ${p.name}? Tej operacji nie można cofnąć.`)) return;
  removePlayer(p._key);
  toast(`${p.name} usunięty`);
}

function confirmReset(){
  if(!confirm('Usunąć WSZYSTKIE dane? Tego nie można cofnąć.')) return;
  db.ref('players').set(null);
  db.ref('history').set(null);
  toast('Reset gotowy');
}

function clearHistory(){
  db.ref('history').set(null);
  toast('Historia wyczyszczona');
}

// ── TABS ──
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['ranking','profiles','add','history'][i]===name)
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='ranking') renderRanking();
}

// ── TOAST ──
let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── EMOJI & COLOR PICKERS ──
function initPickers(){
  const ep = document.getElementById('emojiPick');
  ep.innerHTML = EMOJIS.map(e=>`<button class="emoji-btn ${e===selEmoji?'sel':''}" onclick="pickEmoji('${e}')">${e}</button>`).join('');
  const cp = document.getElementById('colorPick');
  cp.innerHTML = COLORS.map(c=>`<div class="color-dot ${c===selColor?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');
}
function pickEmoji(e){selEmoji=e;initPickers()}
function pickColor(c){selColor=c;initPickers()}

document.getElementById('addName').addEventListener('keydown',ev=>{if(ev.key==='Enter')addPlayer()});
document.getElementById('modalNote').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();confirmModal();}});

// ── CANVAS PARTICLES ──
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
  function init(){
    resize();pts=[];
    for(let i=0;i<80;i++) pts.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      r:Math.random()*2+.5,
      hue:260+Math.random()*40
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,70%,.7)`;
      ctx.fill();
    });
    // connections
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`hsla(270,70%,70%,${.15*(1-d/120)})`;
          ctx.lineWidth=.5;ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  init();draw();
})();

initPickers();
// hide loader when Firebase fires first onValue
setTimeout(()=>{ document.getElementById('loaderBar').style.width='100%'; },100);
setTimeout(()=>{
  const l = document.getElementById('loader');
  l.style.opacity='0';
  setTimeout(()=>l.style.display='none',600);
},1800);
render();
</script>
