<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#080810;--bg3:#13131f;--card:#141420;--card2:#1a1a2e;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--tx:#f0eef8;--mu:#6b6880;--ac:#a78bfa;--ac2:#7c3aed;--gn:#10b981;--rd:#f43f5e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s}
#loader.gone{opacity:0;pointer-events:none}
.ltitle{font-family:'Bebas Neue',sans-serif;font-size:80px;letter-spacing:8px;background:linear-gradient(135deg,#e0d7ff,#a78bfa,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lsub{font-size:12px;letter-spacing:4px;color:var(--mu);text-transform:uppercase}
.lbar{width:140px;height:2px;background:var(--card2);border-radius:2px;overflow:hidden}
.lfill{height:100%;width:0;background:linear-gradient(90deg,#7c3aed,#a78bfa);border-radius:2px;transition:width 1.5s ease}
#sbar{position:fixed;top:0;left:0;right:0;z-index:200;padding:6px;font-size:12px;text-align:center;display:none}
#sbar.on{background:rgba(16,185,129,.15);color:var(--gn);display:block}
#sbar.off{background:rgba(244,63,94,.15);color:var(--rd);display:block}
#bgc{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.3}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:4rem 1.25rem 4rem}
.hdr{text-align:center;padding:2rem 0}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,12vw,110px);letter-spacing:6px;line-height:.9;background:linear-gradient(135deg,#e0d7ff,#a78bfa,#7c3aed,#4f1fd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.2)}}
.hsub{font-size:12px;letter-spacing:4px;color:var(--mu);text-transform:uppercase;margin-top:.5rem}
.tabs{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--b1);border-radius:14px;padding:5px;margin-bottom:2rem}
.tab{flex:1;padding:9px 4px;text-align:center;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--mu);border:none;background:transparent;font-family:inherit}
.tab.on{background:var(--card2);color:var(--tx);box-shadow:0 0 20px rgba(124,58,237,.2)}
.tab:hover:not(.on){color:var(--tx)}
.pnl{display:none}.pnl.on{display:block}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.lbl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--mu)}
.sr{display:flex;align-items:center;gap:8px}
.si{width:52px;height:28px;text-align:center;background:var(--bg3);border:1px solid var(--b1);border-radius:6px;color:var(--tx);font-size:13px;outline:none}
.si:focus{border-color:var(--ac)}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:2rem;align-items:end}
.pod{border-radius:16px;padding:1.25rem 1rem;text-align:center;border:1px solid var(--b1);background:var(--card);transition:transform .2s}
.pod:hover{transform:translateY(-3px)}
.pod1{border-color:rgba(245,158,11,.3);background:linear-gradient(160deg,#1a1620,#1c1408)}
.pod2{border-color:rgba(148,163,184,.15)}
.pod3{border-color:rgba(205,127,50,.15)}
.pav{width:50px;height:50px;border-radius:50%;margin:8px auto;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--b2)}
.pname{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pscore{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--ac)}
.ptitle{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px}
.gline{height:1px;background:linear-gradient(90deg,transparent,var(--ac),transparent);margin:1.5rem 0;opacity:.3}
.lb{display:flex;flex-direction:column;gap:8px}
.lbr{display:grid;grid-template-columns:36px 44px 1fr auto auto;align-items:center;gap:10px;background:var(--card);border:1px solid var(--b1);border-radius:12px;padding:.7rem 1rem;transition:all .2s}
.lbr:hover{border-color:var(--b2);background:var(--card2);transform:translateX(4px)}
.lbrk{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--mu);text-align:center}
.lbav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:1.5px solid var(--b2)}
.lbn{font-weight:500;font-size:14px}
.lbt{font-size:11px;color:var(--mu)}
.lbs{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--ac)}
.lbc{display:flex;gap:6px;align-items:center}
.btp{width:30px;height:30px;border-radius:50%;border:1.5px solid;background:transparent;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:600;line-height:1}
.bplus{color:var(--gn);border-color:rgba(16,185,129,.4)}.bplus:hover{background:rgba(16,185,129,.15);transform:scale(1.1)}
.bminus{color:var(--rd);border-color:rgba(244,63,94,.4)}.bminus:hover{background:rgba(244,63,94,.15);transform:scale(1.1)}
.ac{background:var(--card);border:1px solid var(--b1);border-radius:16px;padding:1.5rem}
.ar{display:flex;gap:10px;margin-bottom:1rem}
.fi{flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--b1);border-radius:10px;color:var(--tx);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--ac)}.fi::placeholder{color:var(--mu)}
.bm{padding:10px 20px;background:var(--ac2);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.bm:hover{background:#6d28d9;transform:translateY(-1px)}.bm:active{transform:scale(.97)}
.plbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:.5rem}
.epick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.eb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--b1);background:var(--bg3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.eb:hover,.eb.on{border-color:var(--ac);background:rgba(167,139,250,.15)}
.cpick{display:flex;gap:8px;flex-wrap:wrap}
.cd{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.cd.on{border-color:#fff;transform:scale(1.15)}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.pc{background:var(--card);border:1px solid var(--b1);border-radius:16px;padding:1.5rem 1rem;text-align:center;transition:all .2s;position:relative;overflow:hidden}
.pc:hover{border-color:var(--b2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.pca{width:62px;height:62px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid var(--b2);position:relative}
.pcrown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:18px}
.pcn{font-size:15px;font-weight:600;margin-bottom:4px}
.pcb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.pcs{font-family:'Bebas Neue',sans-serif;font-size:46px;line-height:1}
.pcsl{font-size:11px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.pst{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.sb{background:var(--bg3);border-radius:8px;padding:8px;text-align:center}
.sv{font-size:16px;font-weight:600}
.sl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.bdel{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:transparent;border:1px solid var(--b1);color:var(--mu);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.pc:hover .bdel{opacity:1}.bdel:hover{background:rgba(244,63,94,.2);color:var(--rd);border-color:rgba(244,63,94,.4)}
.bedt{position:absolute;top:8px;right:36px;width:24px;height:24px;border-radius:50%;background:transparent;border:1px solid var(--b1);color:var(--mu);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s}
.pc:hover .bedt{opacity:1}.bedt:hover{background:rgba(167,139,250,.2);color:var(--ac);border-color:rgba(167,139,250,.4)}
.tm{margin-top:10px;text-align:left}
.tml{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:6px;text-align:center}
.tmr{display:flex;align-items:center;gap:8px;background:var(--bg3);border-radius:8px;padding:5px 8px;margin-bottom:4px}
.tmd{font-family:'Bebas Neue',sans-serif;font-size:17px;min-width:34px;color:var(--gn)}
.tmn{font-size:11px;color:var(--mu);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-style:italic}
.hl{display:flex;flex-direction:column;gap:6px;max-height:520px;overflow-y:auto;padding-right:4px}
.hl::-webkit-scrollbar{width:4px}.hl::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.hi{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--b1);border-radius:10px;padding:.65rem 1rem}
.hd{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.hb{flex:1;min-width:0}
.ht{font-size:13px;color:var(--mu)}
.ht strong{color:var(--tx);font-weight:500}
.nc{display:inline-flex;align-items:center;gap:3px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:5px;padding:2px 6px;font-size:11px;color:var(--ac);margin-top:3px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hr2{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.hsc{font-family:'Bebas Neue',sans-serif;font-size:20px}
.htm{font-size:10px;color:var(--mu)}
.gn{color:var(--gn)}.rd{color:var(--rd)}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card2);border:1px solid var(--b2);border-radius:12px;padding:.75rem 1.5rem;font-size:14px;font-weight:500;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:9998;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.on{transform:translateX(-50%) translateY(0)}
.spop{position:fixed;font-family:'Bebas Neue',sans-serif;font-size:38px;pointer-events:none;z-index:9997;animation:pf 1.2s ease-out forwards}
@keyframes pf{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.5)}}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.mbg.on{opacity:1;pointer-events:all}
.modal{background:var(--card2);border:1px solid var(--b2);border-radius:18px;padding:1.5rem;width:100%;max-width:400px;transform:translateY(20px) scale(.97);transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.mbg.on .modal{transform:translateY(0) scale(1)}
.mti{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:.5rem}
.mwh{font-size:13px;color:var(--mu);margin-bottom:.75rem}
.mno{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:10px;color:var(--tx);font-family:inherit;font-size:14px;padding:10px 14px;resize:none;outline:none;transition:border-color .15s;min-height:70px}
.mno:focus{border-color:var(--ac)}.mno::placeholder{color:var(--mu)}
.mbt{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.bcan{padding:8px 16px;background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--mu);cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.bcan:hover{color:var(--tx)}
.bcon{padding:8px 18px;background:var(--ac2);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .15s}
.bcon:hover{background:#6d28d9}
.emp{text-align:center;padding:3rem;color:var(--mu);font-size:14px}
.dbt{padding:6px 14px;background:transparent;border:1px solid rgba(244,63,94,.3);border-radius:8px;color:var(--rd);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.dbt:hover{background:rgba(244,63,94,.12)}
.rr{display:flex;justify-content:flex-end;margin-top:1.5rem}
</style>
</head>
<body>

<div id="loader">
  <div class="ltitle">AURA</div>
  <div class="lsub">System punktów paczki</div>
  <div class="lbar"><div class="lfill" id="lfill"></div></div>
</div>

<div id="sbar"></div>
<canvas id="bgc"></canvas>

<div class="wrap">
  <div class="hdr">
    <div class="htitle">AURA</div>
    <div class="hsub">System punktów paczki</div>
  </div>

  <div class="tabs">
    <button class="tab on"  onclick="goTab('ranking')">🏆 Ranking</button>
    <button class="tab"     onclick="goTab('profiles')">👤 Profile</button>
    <button class="tab"     onclick="goTab('add')">➕ Dodaj</button>
    <button class="tab"     onclick="goTab('historia')">📜 Historia</button>
  </div>

  <div class="pnl on" id="pnl-ranking">
    <div class="rh">
      <span class="lbl">Aktualne wyniki</span>
      <div class="sr"><span class="lbl">krok:</span><input class="si" type="number" id="krok" value="1" min="1" max="9999"></div>
    </div>
    <div class="podium" id="podium"></div>
    <div class="gline"></div>
    <div class="lb" id="lb"></div>
    <div class="emp" id="emp-r" style="display:none">Brak graczy — dodaj w zakładce ➕</div>
  </div>

  <div class="pnl" id="pnl-profiles">
    <div class="pgrid" id="pgrid"></div>
    <div class="emp" id="emp-p" style="display:none">Brak profili. Dodaj znajomych!</div>
  </div>

  <div class="pnl" id="pnl-add">
    <div class="ac">
      <div class="lbl" style="margin-bottom:1rem">Nowy gracz</div>
      <div class="ar">
        <input class="fi" id="iname" type="text" placeholder="Imię / ksywka..." maxlength="20">
        <button class="bm" onclick="dodajGracza()">Dodaj</button>
      </div>
      <div class="plbl">Emoji awatara</div>
      <div class="epick" id="epick"></div>
      <div class="plbl" style="margin-top:.75rem">Kolor</div>
      <div class="cpick" id="cpick"></div>
    </div>
    <div class="rr"><button class="dbt" onclick="resetAll()">🗑 Resetuj wszystkie dane</button></div>
  </div>

  <div class="pnl" id="pnl-historia">
    <div class="rh">
      <span class="lbl">Historia wydarzeń</span>
      <button class="dbt" onclick="czyscHistorie()">Wyczyść</button>
    </div>
    <div class="hl" id="hlist"></div>
    <div class="emp" id="emp-h" style="display:none">Brak historii. Zacznij dodawać punkty!</div>
  </div>
</div>

<div class="mbg" id="mbg" onclick="klikTlo(event)">
  <div class="modal">
    <div class="mti">Dodaj notatkę</div>
    <div class="mwh" id="mwh"></div>
    <textarea class="mno" id="mno" placeholder="Za co ta aura? (opcjonalne)..." maxlength="120" rows="3"></textarea>
    <div class="mbt">
      <button class="bcan" onclick="anulujModal()">Anuluj</button>
      <button class="bcon" onclick="zatwierdzModal()">Zatwierdź ↗</button>
    </div>
  </div>
</div>

<!-- MODAL EDYCJI -->
<div class="mbg" id="ebg" onclick="klikTloEdit(event)">
  <div class="modal">
    <div class="mti">Edytuj profil</div>
    <div style="margin-bottom:.75rem">
      <div class="plbl" style="margin-bottom:.4rem">Imię</div>
      <input class="fi" id="ename" type="text" maxlength="20" placeholder="Imię / ksywka...">
    </div>
    <div style="margin-bottom:.75rem">
      <div class="plbl" style="margin-bottom:.4rem">Emoji awatara</div>
      <div class="epick" id="eepick"></div>
    </div>
    <div>
      <div class="plbl" style="margin-bottom:.4rem">Kolor</div>
      <div class="cpick" id="ecpick"></div>
    </div>
    <div class="mbt">
      <button class="bcan" onclick="anulujEdit()">Anuluj</button>
      <button class="bcon" onclick="zatwierdzEdit()">Zapisz ↗</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── FIREBASE ──
firebase.initializeApp({
  apiKey:"AIzaSyBoRXqGPxNJMvXdHIBx7SuWivAr94sqMa8",
  authDomain:"licznik-aury-f74a6.firebaseapp.com",
  databaseURL:"https://licznik-aury-12eba-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"licznik-aury-f74a6",
  storageBucket:"licznik-aury-f74a6.firebasestorage.app",
  messagingSenderId:"260528090852",
  appId:"1:260528090852:web:29eec9f25f65143e2406f1"
});
var FDB = firebase.database();

// ── STAŁE ──
var EMOJI = ['😎','🔥','👑','💀','🐐','🌟','⚡','🦁','🐺','🎯','💎','🧠','👻','🚀','🐉','🦊','🎭','🤖'];
var KOLORY = ['#7c3aed','#0891b2','#059669','#dc2626','#d97706','#db2777','#4f46e5','#0284c7','#16a34a','#ea580c'];
var TYTULY = [
  {min:-99999,t:'Widmo',c:'#6b7280'},
  {min:0,t:'Zwykły',c:'#9ca3af'},
  {min:50,t:'Obiecujący',c:'#60a5fa'},
  {min:150,t:'Zaufany',c:'#34d399'},
  {min:300,t:'Szanowany',c:'#a78bfa'},
  {min:500,t:'Elita',c:'#f59e0b'},
  {min:1000,t:'Legenda',c:'#f43f5e'},
  {min:2000,t:'Bóg Aury',c:'#e879f9'}
];

// ── STAN ──
var GRACZE = [];
var ZDARZENIA = [];
var selEmoji = EMOJI[0];
var selKolor = KOLORY[0];
var pending = null;
var gotowy = false;

// ── FIREBASE NASŁUCHY ──
FDB.ref('gracze').on('value', function(s) {
  var v = s.val();
  GRACZE = v ? Object.keys(v).map(function(k){ return Object.assign({}, v[k], {_k:k}); }) : [];
  if (gotowy) { rysujRanking(); rysujProfile(); }
});

FDB.ref('zdarzenia').on('value', function(s) {
  var v = s.val();
  ZDARZENIA = v
    ? Object.keys(v).map(function(k){ return Object.assign({}, v[k], {_k:k}); })
        .sort(function(a,b){ return b.ts - a.ts; })
        .slice(0,300)
    : [];
  if (gotowy) rysujHistorie();
  if (!gotowy) { gotowy = true; ukryjLoader(); rysujWszystko(); }
});

FDB.ref('.info/connected').on('value', function(s) {
  var sb = document.getElementById('sbar');
  if (s.val()) {
    sb.textContent = '● Połączono';
    sb.className = 'on';
    setTimeout(function(){ sb.style.display='none'; }, 2000);
  } else {
    sb.textContent = '● Brak połączenia';
    sb.className = 'off';
  }
});

// ── HELPER ──
function getTytul(sc) {
  var t = TYTULY[0];
  for (var i=0;i<TYTULY.length;i++) if (sc >= TYTULY[i].min) t = TYTULY[i];
  return t;
}
function inicjaly(n) {
  return n.trim().split(/\s+/).map(function(w){return w[0].toUpperCase();}).slice(0,2).join('');
}
function temu(ts) {
  var d = (Date.now()-ts)/1000;
  if (d<60) return 'przed chwilą';
  if (d<3600) return Math.floor(d/60)+'min temu';
  if (d<86400) return Math.floor(d/3600)+'h temu';
  return Math.floor(d/86400)+'d temu';
}
function sort() { return GRACZE.slice().sort(function(a,b){return b.score-a.score;}); }
function e(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── ZAPIS DO FIREBASE ──
function zapiszGracza(g) {
  var k = g._k;
  var d = Object.assign({}, g);
  delete d._k;
  if (k) { FDB.ref('gracze/'+k).set(d); }
  else { var r = FDB.ref('gracze').push(); g._k = r.key; r.set(d); }
}
function zapiszZdarzenie(z) { FDB.ref('zdarzenia').push().set(z); }
function usunGraczaDB(k) { FDB.ref('gracze/'+k).remove(); }

// ── ZMIANA PUNKTÓW ──
function zmienPunkty(id, dir) {
  var krok = parseInt(document.getElementById('krok').value)||1;
  var g = null;
  for (var i=0;i<GRACZE.length;i++) if (String(GRACZE[i].id)===String(id)) { g=GRACZE[i]; break; }
  if (!g) return;
  var delta = dir * krok;
  pending = {id:id, delta:delta};
  document.getElementById('mwh').textContent = (g.emoji||'') + ' ' + g.name + '  ·  ' + (delta>0?'+':'') + delta + ' aury';
  document.getElementById('mno').value = '';
  document.getElementById('mbg').classList.add('on');
  setTimeout(function(){ document.getElementById('mno').focus(); }, 200);
}

function zatwierdzModal() {
  if (!pending) return;
  var notatka = document.getElementById('mno').value.trim();
  zastosujPunkty(pending.id, pending.delta, notatka);
  zamknijModal();
}
function anulujModal() { zamknijModal(); }
function zamknijModal() { document.getElementById('mbg').classList.remove('on'); pending = null; }
function klikTlo(ev) { if (ev.target===document.getElementById('mbg')) zamknijModal(); }

document.addEventListener('keydown', function(ev){ if(ev.key==='Escape') zamknijModal(); });
document.getElementById('mno').addEventListener('keydown', function(ev){
  if (ev.key==='Enter'&&!ev.shiftKey) { ev.preventDefault(); zatwierdzModal(); }
});

function zastosujPunkty(id, delta, notatka) {
  var g = null;
  for (var i=0;i<GRACZE.length;i++) if (String(GRACZE[i].id)===String(id)) { g=GRACZE[i]; break; }
  if (!g) return;
  g.score = (g.score||0) + delta;
  g.dodane = (g.dodane||0) + (delta>0?delta:0);
  g.stracone = (g.stracone||0) + (delta<0?Math.abs(delta):0);
  g.zmiany = (g.zmiany||0) + 1;
  zapiszGracza(g);
  var z = {id:String(id), name:g.name, delta:delta, ts:Date.now()};
  if (notatka) z.note = notatka;
  zapiszZdarzenie(z);
  popup(delta);
  toast(g.name+': '+(delta>0?'+':'')+delta+' aury'+(notatka?' — '+notatka:''));
}

function popup(delta) {
  var el = document.createElement('div');
  el.className = 'spop';
  el.style.left = (Math.random()*60+20)+'%';
  el.style.top = (Math.random()*30+30)+'%';
  el.style.color = delta>0?'#10b981':'#f43f5e';
  el.textContent = (delta>0?'+':'')+delta;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 1300);
}

// ── DODAJ / USUŃ GRACZA ──
function dodajGracza() {
  var name = document.getElementById('iname').value.trim();
  if (!name) return toast('Wpisz imię!');
  for (var i=0;i<GRACZE.length;i++)
    if (GRACZE[i].name.toLowerCase()===name.toLowerCase()) return toast('Taki gracz już istnieje!');
  var g = {id:String(Date.now()), name:name, emoji:selEmoji, color:selKolor, score:0, dodane:0, stracone:0, zmiany:0};
  zapiszGracza(g);
  document.getElementById('iname').value = '';
  toast(name+' dołączył do paczki! 🎉');
  goTab('ranking');
}

function usunGracza(id) {
  var g = null;
  for (var i=0;i<GRACZE.length;i++) if (String(GRACZE[i].id)===String(id)) { g=GRACZE[i]; break; }
  if (!g) return;
  if (!confirm('Usunąć '+g.name+'?')) return;
  usunGraczaDB(g._k);
  toast(g.name+' usunięty');
}

function resetAll() {
  if (!confirm('Usunąć WSZYSTKIE dane?')) return;
  FDB.ref('gracze').set(null);
  FDB.ref('zdarzenia').set(null);
  toast('Reset gotowy');
}

function czyscHistorie() {
  if (!confirm('Wyczyścić historię?')) return;
  FDB.ref('zdarzenia').set(null);
  toast('Historia wyczyszczona');
}

// ── RENDER ──
function rysujWszystko() { rysujRanking(); rysujProfile(); rysujHistorie(); }

function rysujRanking() {
  var lista = sort();
  var podEl = document.getElementById('podium');
  var lbEl  = document.getElementById('lb');
  var empEl = document.getElementById('emp-r');
  if (!lista.length) { podEl.innerHTML=''; lbEl.innerHTML=''; empEl.style.display='block'; return; }
  empEl.style.display = 'none';

  var sloty = [lista[1], lista[0], lista[2]];
  var medale = ['🥈','🥇','🥉'];
  var klasy = ['pod2','pod1','pod3'];
  podEl.innerHTML = sloty.map(function(p,i){
    if (!p) return '<div class="pod '+klasy[i]+'" style="opacity:.2"><div>'+medale[i]+'</div></div>';
    var ty = getTytul(p.score);
    return '<div class="pod '+klasy[i]+'">'
      +'<div>'+medale[i]+'</div>'
      +'<div class="pav" style="background:'+p.color+'22;border-color:'+p.color+'55">'+(p.emoji||inicjaly(p.name))+'</div>'
      +'<div class="pname">'+e(p.name)+'</div>'
      +'<div class="pscore">'+p.score+'</div>'
      +'<div class="ptitle" style="color:'+ty.c+'">'+ty.t+'</div>'
      +'</div>';
  }).join('');

  lbEl.innerHTML = lista.map(function(p,i){
    var ty = getTytul(p.score);
    return '<div class="lbr">'
      +'<div class="lbrk">'+(i+1)+'</div>'
      +'<div class="lbav" style="background:'+p.color+'22;border-color:'+p.color+'55">'+(p.emoji||inicjaly(p.name))+'</div>'
      +'<div><div class="lbn">'+e(p.name)+'</div><div class="lbt" style="color:'+ty.c+'">'+ty.t+'</div></div>'
      +'<div class="lbs">'+p.score+'</div>'
      +'<div class="lbc">'
      +'<button class="btp bminus" onclick="zmienPunkty(\''+p.id+'\',-1)">−</button>'
      +'<button class="btp bplus"  onclick="zmienPunkty(\''+p.id+'\',1)">+</button>'
      +'</div></div>';
  }).join('');
}

function topMomenty(pid) {
  var mom = [];
  for (var i=0;i<ZDARZENIA.length;i++) {
    var z = ZDARZENIA[i];
    if (String(z.id)===String(pid) && z.note && z.delta>0) mom.push(z);
  }
  mom.sort(function(a,b){return b.delta-a.delta;});
  mom = mom.slice(0,3);
  if (!mom.length) return '';
  var html = '<div class="tm"><div class="tml">🏅 Top momenty</div>';
  for (var j=0;j<mom.length;j++)
    html += '<div class="tmr"><div class="tmd">+'+mom[j].delta+'</div><div class="tmn">'+e(mom[j].note)+'</div></div>';
  html += '</div>';
  return html;
}

function rysujProfile() {
  var lista = sort();
  var grid = document.getElementById('pgrid');
  var emp  = document.getElementById('emp-p');
  if (!lista.length) { grid.innerHTML=''; emp.style.display='block'; return; }
  emp.style.display = 'none';
  var html = '';
  for (var i=0;i<lista.length;i++) {
    var p = lista[i];
    var ty = getTytul(p.score);
    var sc = p.score<0?'#f43f5e':p.score===0?'#6b7280':'#a78bfa';
    html += '<div class="pc">'
      +'<button class="bedt" onclick="otworzEdit(\''+p.id+'\')">✏️</button>'
      +'<button class="bdel" onclick="usunGracza(\''+p.id+'\')">✕</button>'
      +'<div class="pca" style="background:'+p.color+'22;border-color:'+p.color+'44">'
      +(i===0?'<div class="pcrown">👑</div>':'')
      +'<span style="font-size:26px">'+(p.emoji||inicjaly(p.name))+'</span></div>'
      +'<div class="pcn">'+e(p.name)+'</div>'
      +'<div class="pcb" style="color:'+ty.c+';border:1px solid '+ty.c+'44;background:'+ty.c+'18">'+ty.t+'</div>'
      +'<div class="pcs" style="color:'+sc+'">'+p.score+'</div>'
      +'<div class="pcsl">punktów aury</div>'
      +'<div class="pst">'
      +'<div class="sb"><div class="sv" style="color:#10b981">+'+(p.dodane||0)+'</div><div class="sl">zdobyte</div></div>'
      +'<div class="sb"><div class="sv" style="color:#f43f5e">-'+(p.stracone||0)+'</div><div class="sl">stracone</div></div>'
      +'<div class="sb"><div class="sv">'+(p.zmiany||0)+'</div><div class="sl">zmian</div></div>'
      +'<div class="sb"><div class="sv">'+(i+1)+'</div><div class="sl">miejsce</div></div>'
      +'</div>'
      +topMomenty(p.id)
      +'</div>';
  }
  grid.innerHTML = html;
}

function rysujHistorie() {
  var listEl = document.getElementById('hlist');
  var empEl  = document.getElementById('emp-h');
  if (!ZDARZENIA.length) { listEl.innerHTML=''; empEl.style.display='block'; return; }
  empEl.style.display = 'none';
  var html = '';
  for (var i=0;i<ZDARZENIA.length;i++) {
    var z = ZDARZENIA[i];
    var pos = z.delta>0;
    html += '<div class="hi">'
      +'<div class="hd" style="background:'+(pos?'#10b981':'#f43f5e')+'"></div>'
      +'<div class="hb">'
      +'<div class="ht"><strong>'+e(z.name)+'</strong> '+(pos?'zyskał':'stracił')+' aurę</div>'
      +(z.note?'<div class="nc">💬 '+e(z.note)+'</div>':'')
      +'</div>'
      +'<div class="hr2">'
      +'<div class="hsc '+(pos?'gn':'rd')+'">'+(pos?'+':'')+z.delta+'</div>'
      +'<div class="htm">'+temu(z.ts)+'</div>'
      +'</div></div>';
  }
  listEl.innerHTML = html;
}

// ── EDYCJA PROFILU ──
var editId = null;
var editEmoji = null;
var editKolor = null;

function otworzEdit(id) {
  var g = null;
  for (var i=0;i<GRACZE.length;i++) if (String(GRACZE[i].id)===String(id)) { g=GRACZE[i]; break; }
  if (!g) return;
  editId = id;
  editEmoji = g.emoji || EMOJI[0];
  editKolor = g.color || KOLORY[0];
  document.getElementById('ename').value = g.name;
  rysujEditPickery();
  document.getElementById('ebg').classList.add('on');
  setTimeout(function(){ document.getElementById('ename').focus(); }, 200);
}

function rysujEditPickery() {
  var ep = document.getElementById('eepick');
  ep.innerHTML = EMOJI.map(function(em){
    return '<button class="eb'+(em===editEmoji?' on':'')+'" onclick="pickEditE(\''+em+'\')">'+em+'</button>';
  }).join('');
  var cp = document.getElementById('ecpick');
  cp.innerHTML = KOLORY.map(function(ko){
    return '<div class="cd'+(ko===editKolor?' on':'')+'" style="background:'+ko+'" onclick="pickEditK(\''+ko+'\')"></div>';
  }).join('');
}

function pickEditE(em) { editEmoji=em; rysujEditPickery(); }
function pickEditK(ko) { editKolor=ko; rysujEditPickery(); }

function zatwierdzEdit() {
  var nowaName = document.getElementById('ename').value.trim();
  if (!nowaName) return toast('Wpisz imię!');
  var g = null;
  for (var i=0;i<GRACZE.length;i++) if (String(GRACZE[i].id)===String(editId)) { g=GRACZE[i]; break; }
  if (!g) return;
  // check duplicate name (ignore self)
  for (var j=0;j<GRACZE.length;j++) {
    if (String(GRACZE[j].id)!==String(editId) && GRACZE[j].name.toLowerCase()===nowaName.toLowerCase())
      return toast('Taki gracz już istnieje!');
  }
  var staraName = g.name;
  g.name = nowaName;
  g.emoji = editEmoji;
  g.color = editKolor;
  zapiszGracza(g);
  anulujEdit();
  toast(staraName+' → zaktualizowany ✓');
}

function anulujEdit() { document.getElementById('ebg').classList.remove('on'); editId=null; }
function klikTloEdit(ev) { if (ev.target===document.getElementById('ebg')) anulujEdit(); }

// ── ZAKŁADKI ──
var ZAKLADKI = ['ranking','profiles','add','historia'];
function goTab(name) {
  var tabs = document.querySelectorAll('.tab');
  for (var i=0;i<tabs.length;i++) tabs[i].classList.toggle('on', ZAKLADKI[i]===name);
  var pnls = document.querySelectorAll('.pnl');
  for (var j=0;j<pnls.length;j++) pnls[j].classList.remove('on');
  document.getElementById('pnl-'+name).classList.add('on');
  if (name==='ranking')  rysujRanking();
  if (name==='profiles') rysujProfile();
  if (name==='historia') rysujHistorie();
}

// ── TOAST ──
var tTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(tTimer);
  tTimer = setTimeout(function(){ el.classList.remove('on'); }, 2500);
}

// ── PICKERY ──
function rysujPickery() {
  var ep = document.getElementById('epick');
  ep.innerHTML = EMOJI.map(function(em){
    return '<button class="eb'+(em===selEmoji?' on':'')+'" onclick="pickE(\''+em+'\')">'+em+'</button>';
  }).join('');
  var cp = document.getElementById('cpick');
  cp.innerHTML = KOLORY.map(function(ko){
    return '<div class="cd'+(ko===selKolor?' on':'')+'" style="background:'+ko+'" onclick="pickK(\''+ko+'\')"></div>';
  }).join('');
}
function pickE(em) { selEmoji=em; rysujPickery(); }
function pickK(ko) { selKolor=ko; rysujPickery(); }

document.getElementById('iname').addEventListener('keydown', function(ev){
  if (ev.key==='Enter') dodajGracza();
});

// ── LOADER ──
function ukryjLoader() {
  document.getElementById('lfill').style.width = '100%';
  setTimeout(function(){
    var l = document.getElementById('loader');
    l.classList.add('gone');
    setTimeout(function(){ l.style.display='none'; }, 600);
  }, 400);
}
setTimeout(function(){ if(!gotowy){ gotowy=true; ukryjLoader(); rysujWszystko(); toast('⚠️ Sprawdź internet'); }}, 8000);
setTimeout(function(){ document.getElementById('lfill').style.width='60%'; }, 100);

// ── TŁO CZĄSTECZKI ──
(function(){
  var cv = document.getElementById('bgc');
  var cx = cv.getContext('2d');
  var W,H,pts=[];
  function rz(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
  function init(){
    rz(); pts=[];
    for(var i=0;i<70;i++) pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+.5,h:260+Math.random()*40});
  }
  function draw(){
    cx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2);
      cx.fillStyle='hsla('+p.h+',80%,70%,.7)'; cx.fill();
      for(var j=i+1;j<pts.length;j++){
        var dx=p.x-pts[j].x,dy=p.y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){ cx.beginPath(); cx.moveTo(p.x,p.y); cx.lineTo(pts[j].x,pts[j].y); cx.strokeStyle='hsla(270,70%,70%,'+(.15*(1-d/120))+')'; cx.lineWidth=.5; cx.stroke(); }
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',rz);
  init(); draw();
})();

rysujPickery();
</script>
